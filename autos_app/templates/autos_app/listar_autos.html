{% extends 'base/base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <h2>Auto Inventory</h2>
    <a href="{% url 'agregar_auto' %}">Add New Auto</a>
    <ul>
        {% for auto in autos %}
            <li>{{ auto }}</li>
        {% empty %}
            <li>No autos available.</li>
        {% endfor %}
    </ul>
{% endblock %}
